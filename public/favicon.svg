<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#0e1015"/>
  <!-- outer ring -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="#f97316" stroke-width="4"/>
  <!-- inner dark circle -->
  <circle cx="50" cy="50" r="29" fill="#1a1d25"/>
  <!-- cardinal notches -->
  <line x1="50" y1="12" x2="50" y2="20" stroke="#f97316" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="80" x2="50" y2="88" stroke="#f97316" stroke-width="3" stroke-linecap="round"/>
  <line x1="12" y1="50" x2="20" y2="50" stroke="#f97316" stroke-width="3" stroke-linecap="round"/>
  <line x1="80" y1="50" x2="88" y2="50" stroke="#f97316" stroke-width="3" stroke-linecap="round"/>
  <!-- sine wave signal -->
  <path d="M28 50 Q33 38 38 50 Q43 62 48 50" fill="none" stroke="#f3f4f6" stroke-width="2.5" stroke-linecap="round"/>
  <!-- fault break point + orange spike -->
  <path d="M48 50 L52 40 L56 58 L60 45" fill="none" stroke="#f97316" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
